<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>N-Body — JS vs WebGPU | Passe-Tech</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 16px;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: #7ec8a0;
      text-transform: uppercase;
    }

    .panels {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .label {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #888;
      text-transform: uppercase;
    }

    canvas {
      border: 1px solid #222;
      border-radius: 4px;
      display: block;
    }

    .stats {
      font-size: 0.85rem;
      color: #aaa;
      text-align: center;
      line-height: 1.8;
    }

    .stats span {
      color: #7ec8a0;
      font-weight: bold;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .control-group label {
      font-size: 0.7rem;
      color: #666;
      letter-spacing: 0.08em;
    }

    input[type=range] {
      width: 120px;
      accent-color: #7ec8a0;
    }

    .warning {
      background: #1a1a2e;
      border: 1px solid #ff6b6b;
      border-radius: 4px;
      padding: 12px 20px;
      font-size: 0.8rem;
      color: #ff6b6b;
      text-align: center;
      max-width: 500px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    .badge-js  { background: #f7df1e22; color: #f7df1e; border: 1px solid #f7df1e55; }
    .badge-gpu { background: #7ec8a022; color: #7ec8a0; border: 1px solid #7ec8a055; }
  </style>
</head>
<body>

<h1>⚡ N-Body — JavaScript vs WebGPU</h1>

<div id="no-webgpu" class="warning" style="display:none">
  ⚠️ WebGPU non disponible sur ce browser.<br>
  Activez-le via <code>chrome://flags/#enable-unsafe-webgpu</code> ou utilisez Chrome 113+.
</div>

<div class="panels">

  <!-- Panneau JS -->
  <div class="panel">
    <div class="label"><span class="badge badge-js">JS</span> CPU — naïf O(n²)</div>
    <canvas id="canvas-js" width="600" height="600"></canvas>
    <div class="stats" id="stats-js">
      Particules : <span id="js-count">—</span><br>
      FPS : <span id="js-fps">—</span><br>
      ms/frame : <span id="js-ms">—</span>
    </div>
  </div>

  <!-- Panneau WebGPU -->
  <div class="panel">
    <div class="label"><span class="badge badge-gpu">WebGPU</span> GPU — parallèle</div>
    <canvas id="canvas-gpu" width="600" height="600"></canvas>
    <div class="stats" id="stats-gpu">
      Particules : <span id="gpu-count">—</span><br>
      FPS : <span id="gpu-fps">—</span><br>
      ms/frame : <span id="gpu-ms">—</span>
    </div>
  </div>

</div>

<!-- Contrôles -->
<div class="controls">
  <div class="control-group">
    <label>Particules JS : <strong id="lbl-js-n">500</strong></label>
    <input type="range" id="js-n" min="0" max="10000" step="100" value="0">
  </div>
  <div class="control-group">
    <label>Particules GPU : <strong id="lbl-gpu-n">10000</strong></label>
    <input type="range" id="gpu-n" min="0" max="100000" step="1000" value="0">
  </div>
  <div class="control-group">
    <label>Gravité : <strong id="lbl-gravity">0.10</strong></label>
    <input type="range" id="gravity" min="0.01" max="0.5" step="0.01" value="0.05">
  </div>
  <div class="control-group">
    <label>Softening ε : <strong id="lbl-eps">20</strong></label>
    <input type="range" id="eps" min="1" max="100" step="1" value="20">
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
